<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第 2 题：Session 窗口的作用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .question {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        .option.selected {
            background: #e7f3ff;
            border-color: #667eea;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .option input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
            animation: slideIn 0.5s;
        }
        .result.correct {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .result.wrong {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        .result.correct h3 { color: #155724; }
        .result.wrong h3 { color: #721c24; }
        .result p {
            line-height: 1.6;
            color: #333;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>第 2 题</h1>
            <p>Session 窗口的作用</p>
        </div>
        
        <div class="question">
            <strong>问题：</strong>在 Minitab 中，Session 窗口主要用于什么？
        </div>
        
        <div class="options" id="options">
            <label class="option" data-value="A">
                <input type="radio" name="answer" value="A">
                <span>A. 录入和整理数据</span>
            </label>
            <label class="option" data-value="B">
                <input type="radio" name="answer" value="B">
                <span>B. 显示文字形式的统计分析结果</span>
            </label>
            <label class="option" data-value="C">
                <input type="radio" name="answer" value="C">
                <span>C. 绘制图表</span>
            </label>
            <label class="option" data-value="D">
                <input type="radio" name="answer" value="D">
                <span>D. 管理项目文件</span>
            </label>
        </div>
        
        <button class="btn" id="submitBtn" onclick="checkAnswer()" disabled>提交答案</button>
        
        <div class="result" id="result"></div>
        
        <a href="../index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        const correctAnswer = 'B';
        const explanation = 'Session 窗口用于显示文字形式的统计分析结果，包括 P 值、回归方程、描述性统计量等。工作表用于录入数据，图形窗口用于绘图。';
        
        let selectedAnswer = null;
        
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input').checked = true;
                selectedAnswer = this.dataset.value;
                document.getElementById('submitBtn').disabled = false;
            });
        });
        
        function checkAnswer() {
            if (!selectedAnswer) return;
            
            const options = document.querySelectorAll('.option');
            const result = document.getElementById('result');
            const isCorrect = selectedAnswer === correctAnswer;
            
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.dataset.value === correctAnswer) {
                    opt.classList.add('correct');
                } else if (opt.classList.contains('selected') && !isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            document.getElementById('submitBtn').disabled = true;
            
            if (isCorrect) {
                result.className = 'result show correct';
                result.innerHTML = `
                    <h3>✅ 回答正确！</h3>
                    <p><strong>解析：</strong>${explanation}</p>
                `;
            } else {
                result.className = 'result show wrong';
                result.innerHTML = `
                    <h3>❌ 回答错误</h3>
                    <p><strong>你的答案：</strong>${selectedAnswer}</p>
                    <p><strong>正确答案：</strong>${correctAnswer}</p>
                    <p><strong>解析：</strong>${explanation}</p>
                `;
            }
        }
    </script>
</body>
</html>
