<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitab 练习题 001 - 工作表的作用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateX(5px);
        }
        .option.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .option.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .option.wrong {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }
        .option input[type="radio"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 16px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        .result.correct {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .result.wrong {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        .result h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }
        .result.correct h3 {
            color: #155724;
        }
        .result.wrong h3 {
            color: #721c24;
        }
        .result p {
            line-height: 1.6;
            color: #333;
        }
        .result .explanation {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Minitab 练习题 001</h1>
            <p>Minitab 15 中文版 · 基础认知</p>
        </div>
        
        <div class="content">
            <div class="question">
                工作表（Worksheet）在 Minitab 里主要用于什么？
            </div>
            
            <div class="options" id="options">
                <div class="option" data-value="A" onclick="selectOption(this)">
                    <input type="radio" name="answer" id="optA" value="A">
                    <label for="optA">A. 查看P值和统计结果</label>
                </div>
                <div class="option" data-value="B" onclick="selectOption(this)">
                    <input type="radio" name="answer" id="optB" value="B">
                    <label for="optB">B. 录入和整理数据</label>
                </div>
                <div class="option" data-value="C" onclick="selectOption(this)">
                    <input type="radio" name="answer" id="optC" value="C">
                    <label for="optC">C. 只看图表</label>
                </div>
                <div class="option" data-value="D" onclick="selectOption(this)">
                    <input type="radio" name="answer" id="optD" value="D">
                    <label for="optD">D. 给软件安装插件</label>
                </div>
            </div>
            
            <button class="btn" id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
            
            <div class="result" id="result"></div>
        </div>
        
        <div class="footer">
            Minitab 学习 · 传音控股质量管理部
        </div>
    </div>

    <script>
        const correctAnswer = 'B';
        const explanation = '工作表主要用于录入和整理数据，类似Excel。统计结果看Session窗口，图表在图形窗口独立弹出。';
        
        let selectedAnswer = null;
        
        function selectOption(element) {
            // 如果已提交，不允许更改
            if (document.getElementById('submitBtn').disabled && document.getElementById('result').classList.contains('show')) {
                return;
            }
            
            // 清除之前的选择
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
                opt.querySelector('input').checked = false;
            });
            
            // 设置新选择
            element.classList.add('selected');
            element.querySelector('input').checked = true;
            selectedAnswer = element.dataset.value;
            
            // 启用提交按钮
            document.getElementById('submitBtn').disabled = false;
        }
        
        function submitAnswer() {
            if (!selectedAnswer) return;
            
            const resultDiv = document.getElementById('result');
            const options = document.querySelectorAll('.option');
            
            // 禁用提交按钮
            document.getElementById('submitBtn').disabled = true;
            
            // 显示正确答案
            options.forEach(opt => {
                const value = opt.dataset.value;
                if (value === correctAnswer) {
                    opt.classList.add('correct');
                } else if (value === selectedAnswer && selectedAnswer !== correctAnswer) {
                    opt.classList.add('wrong');
                }
                // 禁用点击
                opt.style.pointerEvents = 'none';
            });
            
            // 显示结果
            if (selectedAnswer === correctAnswer) {
                resultDiv.className = 'result show correct';
                resultDiv.innerHTML = `
                    <h3>✅ 回答正确！</h3>
                    <p>正确答案是 <strong>B. 录入和整理数据</strong></p>
                    <div class="explanation">
                        <strong>📖 解析：</strong>${explanation}
                    </div>
                `;
            } else {
                resultDiv.className = 'result show wrong';
                resultDiv.innerHTML = `
                    <h3>❌ 回答错误</h3>
                    <p>你的答案是 <strong>${selectedAnswer}</strong>，正确答案是 <strong>B. 录入和整理数据</strong></p>
                    <div class="explanation">
                        <strong>📖 解析：</strong>${explanation}
                    </div>
                `;
            }
            
            // 滚动到结果
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
