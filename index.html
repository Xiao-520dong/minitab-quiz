<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minitab 练习题 - 交互版</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .quiz-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .options label { display: block; padding: 10px; border: 1px solid #ddd; margin: 5px 0; border-radius: 6px; cursor: pointer; }
        .btn { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .result { margin-top: 10px; display: none; padding: 10px; background: #eef; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container" id="quiz-app"></div>
    <script>
        const quizData = [
            { id: "Q001", q: "工作表的作用？", options: ["查看P值", "录入数据", "只看图表", "安装插件"], answer: 1, explanation: "工作表用于录入数据。" },
            { id: "Q002", q: "Session窗口作用？", options: ["录入数据", "显示统计结果", "绘图", "管理文件"], answer: 1, explanation: "Session窗口显示统计分析结果。" }
        ];
        
        const app = document.getElementById('quiz-app');
        quizData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'quiz-card';
            div.innerHTML = `<h3>${item.q}</h3>${item.options.map((opt, i) => `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}
            <button onclick="check(${index})">检查</button><div id="res${index}" class="result"></div>`;
            app.appendChild(div);
        });

        function check(index) {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const res = document.getElementById(`res${index}`);
            res.style.display = 'block';
            res.innerText = parseInt(selected.value) === quizData[index].answer ? "正确！" : "错误。解析：" + quizData[index].explanation;
        }
    </script>
</body>
</html>
