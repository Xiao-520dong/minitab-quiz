<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitab 练习题 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        .header p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 25px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }
        .quiz-list {
            display: grid;
            gap: 20px;
        }
        .quiz-card {
            background: white;
            border-radius: 12px;
            padding: 25px 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .quiz-info {
            flex: 1;
        }
        .quiz-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .quiz-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .quiz-category {
            color: #999;
            font-size: 14px;
        }
        .quiz-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .quiz-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 40px;
            padding: 20px;
        }
        .coming-soon {
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 25px 30px;
            text-align: center;
            color: #999;
        }
        .coming-soon span {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Minitab 练习题</h1>
            <p>Minitab 15 中文版 · 从零开始学统计分析</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalQuizzes">3</div>
                    <div class="stat-label">练习题总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">3</div>
                    <div class="stat-label">知识模块</div>
                </div>
            </div>
        </div>

        <div class="quiz-list">
            <div class="quiz-card">
                <div class="quiz-info">
                    <span class="quiz-number">第 1 题</span>
                    <div class="quiz-title">工作表的作用</div>
                    <div class="quiz-category">📁 基础认知 · Minitab 界面</div>
                </div>
                <a href="output/quiz-001.html" class="quiz-btn">开始答题 →</a>
            </div>

            <div class="quiz-card">
                <div class="quiz-info">
                    <span class="quiz-number">第 2 题</span>
                    <div class="quiz-title">Session 窗口的作用</div>
                    <div class="quiz-category">📁 基础认知 · Minitab 界面</div>
                </div>
                <a href="output/quiz-002.html" class="quiz-btn">开始答题 →</a>
            </div>

            <div class="quiz-card">
                <div class="quiz-info">
                    <span class="quiz-number">第 3 题</span>
                    <div class="quiz-title">图形窗口的作用</div>
                    <div class="quiz-category">📁 基础认知 · Minitab 界面</div>
                </div>
                <a href="output/quiz-003.html" class="quiz-btn">开始答题 →</a>
            </div>

            <div class="coming-soon">
                <span>🚧</span>
                更多练习题持续更新中...
            </div>
        </div>

        <div class="footer">
            <p>Minitab 学习 · 传音控股质量管理部</p>
            <p style="margin-top: 10px; font-size: 14px;">💡 建议按顺序学习，循序渐进效果更好</p>
        </div>
    </div>
</body>
</html>
